<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV PRIVADA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="acceso">
        <h1>SISTEMA PRIVADO DE STREAMING</h1>
        <p>Acceso limitado a 30 usuarios.</p>
        <div style="margin: 20px; color: #00ff00;">
            USUARIOS: <span id="user-count">12 / 30</span>
        </div>
        <button class="btn-acceso" onclick="iniciarSistema()">ENTRAR AL SISTEMA</button>
    </div>

    <div id="tv-container" style="display: none; width: 100%;">
        <header>
            <h2 style="color: #ffcc00; padding: 20px;">TELE-VANLU LIVE</h2>
        </header>
        <div id="grid-canales"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
