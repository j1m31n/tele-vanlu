<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Vaughn Live</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- PANTALLA DE ACCESO -->
<div id="lock-screen">
    <h1>🔒 ACCESO PRIVADO</h1>
    <p>Usuarios activos:</p>
    <p id="user-count">Cargando...</p>
    <button onclick="iniciarSistema()">ENTRAR</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

    <header>
        <h2>📺 MINI VAUGHN LIVE</h2>
    </header>

    <!-- CANALES -->
    <div id="canales"></div>

    <!-- MODAL -->
    <div id="modal" class="hidden">
        <div class="modal-content">

            <div class="player-area">
                <video id="player" controls autoplay></video>
            </div>

            <div class="chat-area">
                <h3>💬 Chat</h3>
                <iframe src="https://www3.cbox.ws/box/?boxid=3536301&boxtag=abcd" width="100%" height="100%"></iframe>
            </div>

        </div>
    </div>

</div>

<!-- IMPORTANTE: versión para evitar cache -->
<script src="app.js?v=1"></script>

</body>
</html>
